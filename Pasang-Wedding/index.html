<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery - 2026-03-08-7</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }
        
        .slideshow {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            z-index: 3000;
        }
        
        .slideshow.hide-controls {
            cursor: none;
        }
        
        .slideshow-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.4) 70%, transparent 100%);
            backdrop-filter: blur(10px);
            z-index: 100;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        
        .slideshow.hide-controls .slideshow-header {
            opacity: 0;
            transform: translateY(-100%);
            /* pointer-events: none; -- REMOVED: Allow clicks to show controls */
        }
        
        .slideshow-title {
            font-size: 1.2rem;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .slideshow-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .slideshow-image-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        
        .slideshow-image-container.active {
            opacity: 1;
        }
        
        .slideshow-image {
            max-width: 100%;
            max-height: 100%;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .slideshow-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 30px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.4) 70%, transparent 100%);
            backdrop-filter: blur(10px);
            z-index: 100;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        
        .slideshow.hide-controls .slideshow-footer {
            opacity: 0;
            transform: translateY(100%);
            /* pointer-events: none; -- REMOVED: Allow clicks to show controls */
        }
        
        .slideshow-progress {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .slideshow-progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }
        
        .slideshow-progress-bar:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .slideshow-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b5cf6, #ec4899);
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        
        .slideshow-progress-text {
            color: #888;
            font-size: 0.9rem;
            min-width: 80px;
            text-align: right;
        }
        
        .slideshow-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
        
        .slideshow-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .slideshow-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        
        .slideshow-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .slideshow-btn.primary {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
        }
        
        .slideshow-btn.primary:hover {
            background: linear-gradient(135deg, #7c3aed, #db2777);
        }
        
        .slideshow-settings {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .slideshow-setting {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ccc;
            font-size: 0.9rem;
        }
        
        .slideshow-setting select {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .slideshow-setting input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        /* 🎬 Splash Screen */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 1;
            transition: opacity 0.5s ease;
        }
        
        .splash-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .splash-background {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-size: cover;
            background-position: center;
            filter: blur(20px) brightness(0.4);
            z-index: 1;
        }
        
        .splash-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px;
        }
        
        .splash-title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
        }
        
        .splash-subtitle {
            font-size: 1.2rem;
            color: #ccc;
            margin-bottom: 40px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
        }
        
        .splash-play-btn {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            border: none;
            color: #fff;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            font-size: 3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(139, 92, 246, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
        
        .splash-play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 60px rgba(139, 92, 246, 0.7);
        }
        
        .splash-play-btn:active {
            transform: scale(0.95);
        }
        
        .splash-info {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #888;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
        }
        
        @media (max-width: 768px) {
            .splash-title {
                font-size: 1.8rem;
            }
            
            .splash-subtitle {
                font-size: 1rem;
            }
            
            .splash-play-btn {
                width: 100px;
                height: 100px;
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- 🎬 Splash Screen -->
    <div class="splash-screen" id="splashScreen">
        <div class="splash-background" style="background-image: url('images/0000.jpg');"></div>
        <div class="splash-content">
            <div class="splash-title">Photo Gallery - 2026-03-08-7</div>
            <div class="splash-subtitle">1160 photos • Background music</div>
            <button class="splash-play-btn" onclick="startSlideshow()" title="Start Slideshow">
                ▶️
            </button>
            <div class="splash-info">
                Tap to start the slideshow with music
            </div>
        </div>
    </div>
    
    <div class="slideshow" id="slideshow" onmousemove="showControlsTemporarily()" onclick="showControlsTemporarily()" style="display: none;">
        <div class="slideshow-header">
            <div class="slideshow-title">
                <span>🎬</span>
                <span>Photo Gallery - 2026-03-08-7</span>
                <span style="color: #888; font-size: 0.9rem; margin-left: 10px;" id="counter">
                    1 / 1160
                </span>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="slideshow-btn" onclick="toggleFullscreen()" id="fullscreenBtn">
                    ⛶ Fullscreen
                </button>
            </div>
        </div>
        
        <div class="slideshow-main" onclick="togglePlay()">
            <!-- Images will be added by JavaScript -->
        </div>
        
        <div class="slideshow-footer">
            <div class="slideshow-progress">
                <div class="slideshow-progress-bar">
                    <div class="slideshow-progress-fill" id="progressBar"></div>
                </div>
                <div class="slideshow-progress-text" id="progressText">1 / 1160</div>
            </div>
            
            <div class="slideshow-controls">
                <button class="slideshow-btn" onclick="prevSlide()" id="prevBtn">
                    ⏮️ Prev
                </button>
                
                <button class="slideshow-btn primary" onclick="togglePlay()" id="playBtn">
                    ⏸️ Pause
                </button>
                
                <button class="slideshow-btn" onclick="nextSlide()" id="nextBtn">
                    Next ⏭️
                </button>
                
                <div class="slideshow-settings">
                    <div class="slideshow-setting">
                        <span>Speed:</span>
                        <select id="speedSelect" onchange="changeSpeed()">
                            <option value="2">2s</option>
                            <option value="3">3s</option>
                            <option value="5" selected>5s</option>
                            <option value="7">7s</option>
                            <option value="10">10s</option>
                        </select>
                    </div>
                    
                    <div class="slideshow-setting">
                        <input type="checkbox" id="loopCheck" onchange="toggleLoop()" checked>
                        <label for="loopCheck">Loop</label>
                    </div>
                </div>
                

                    <button class="slideshow-btn" onclick="toggleMusic()" title="Music (M)">
                        <span id="musicIcon">🎵</span> Music
                    </button>
            </div>
        </div>
    </div>
    

        <audio id="bgMusic" loop>
            <source src="music/track01.mp3" type="audio/mpeg">
        </audio>

        let currentIndex = 0;
        let isPlaying = true;
        let isLooping = true;
        let isFullscreen = false;
        let hideControlsTimeout = null;
        let slideInterval = null;
        let slideDuration = 5000;
        
        const slideshow = document.getElementById('slideshow');
        const slideshowMain = document.querySelector('.slideshow-main');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const progressBarContainer = document.querySelector('.slideshow-progress-bar');
        const progressText = document.getElementById('progressText');
        const counter = document.getElementById('counter');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const speedSelect = document.getElementById('speedSelect');
        const bgMusic = document.getElementById('bgMusic');
        
        // Preload and create all image containers
        photos.forEach((photo, i) => {
            const container = document.createElement('div');
            container.className = 'slideshow-image-container' + (i === 0 ? ' active' : '');
            
            const img = document.createElement('img');
            img.src = photo.src;
            img.alt = photo.title || `Photo ${i + 1}`;
            img.className = 'slideshow-image';
            
            container.appendChild(img);
            slideshowMain.appendChild(container);
        });
        
        const imageContainers = document.querySelectorAll('.slideshow-image-container');
        
        function updateDisplay() {
            imageContainers.forEach((container, i) => {
                container.classList.toggle('active', i === currentIndex);
            });
            
            const progress = ((currentIndex + 1) / photos.length * 100);
            progressBar.style.width = progress + '%';
            progressText.textContent = `${currentIndex + 1} / ${photos.length}`;
            counter.textContent = `${currentIndex + 1} / ${photos.length}`;
            
            prevBtn.disabled = currentIndex === 0 && !isLooping;
            nextBtn.disabled = currentIndex === photos.length - 1 && !isLooping;
        }
        
        function nextSlide() {
            if (currentIndex < photos.length - 1) {
                currentIndex++;
            } else if (isLooping) {
                currentIndex = 0;
            }
            updateDisplay();
        }
        
        function prevSlide() {
            if (currentIndex > 0) {
                currentIndex--;
            } else if (isLooping) {
                currentIndex = photos.length - 1;
            }
            updateDisplay();
        }
        
        function togglePlay() {
            isPlaying = !isPlaying;
            playBtn.textContent = isPlaying ? '⏸️ Pause' : '▶️ Play';
            
            if (isPlaying) {
                startAutoplay();
            } else {
                stopSlideshow();
            }
        }
        
        function startAutoplay() {
            stopSlideshow();
            slideInterval = setInterval(() => {
                nextSlide();
                if (!isLooping && currentIndex === photos.length - 1) {
                    stopSlideshow();
                    isPlaying = false;
                    playBtn.textContent = '▶️ Play';
                }
            }, slideDuration);
        }
        
        function stopSlideshow() {
            if (slideInterval) {
                clearInterval(slideInterval);
                slideInterval = null;
            }
        }
        
        function changeSpeed() {
            slideDuration = parseInt(speedSelect.value) * 1000;
            if (isPlaying) {
                startSlideshow();
            }
        }
        
        function toggleLoop() {
            isLooping = document.getElementById('loopCheck').checked;
            updateDisplay();
        }
        
        function jumpToSlide(index) {
            if (index >= 0 && index < photos.length) {
                currentIndex = index;
                updateDisplay();
                // Restart slideshow if playing
                if (isPlaying) {
                    startAutoplay();
                }
            }
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                slideshow.requestFullscreen().then(() => {
                    isFullscreen = true;
                    fullscreenBtn.textContent = '⛶ Exit Fullscreen';
                }).catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen().then(() => {
                    isFullscreen = false;
                    fullscreenBtn.textContent = '⛶ Fullscreen';
                });
            }
        }
        
        function showControlsTemporarily() {
            slideshow.classList.remove('hide-controls');
            
            clearTimeout(hideControlsTimeout);
            hideControlsTimeout = setTimeout(() => {
                if (isPlaying) {
                    slideshow.classList.add('hide-controls');
                }
            }, 3000);
        }
        
        function toggleMusic() {
            if (bgMusic) {
                if (bgMusic.paused) {
                    bgMusic.play();
                    document.getElementById('musicIcon').textContent = '🎵';
                } else {
                    bgMusic.pause();
                    document.getElementById('musicIcon').textContent = '🔇';
                }
            }
        }
        
        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            showControlsTemporarily();
            
            switch(e.key) {
                case 'ArrowLeft':
                    prevSlide();
                    break;
                case 'ArrowRight':
                    nextSlide();
                    break;
                case ' ':
                    e.preventDefault();
                    togglePlay();
                    break;
                case 'f':
                case 'F':
                    toggleFullscreen();
                    break;
                case 'm':
                case 'M':
                    if (bgMusic) toggleMusic();
                    break;
                case 'Escape':
                    if (isFullscreen) {
                        document.exitFullscreen();
                    }
                    break;
            }
        });
        
        // Handle fullscreen changes
        document.addEventListener('fullscreenchange', () => {
            isFullscreen = !!document.fullscreenElement;
            fullscreenBtn.textContent = isFullscreen ? '⛶ Exit Fullscreen' : '⛶ Fullscreen';
        });
        
        // Make progress bar clickable (jump to slide)
        progressBarContainer.addEventListener('click', (e) => {
            const rect = progressBarContainer.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const percent = clickX / rect.width;
            const targetIndex = Math.floor(percent * photos.length);
            jumpToSlide(Math.max(0, Math.min(photos.length - 1, targetIndex)));
            showControlsTemporarily();
        });
        
        // 🎬 Splash Screen: Start slideshow on button click
        function startSlideshowFromSplash() {
            // Hide splash screen
            const splashScreen = document.getElementById('splashScreen');
            splashScreen.classList.add('hidden');
            
            // Show slideshow
            const slideshow = document.getElementById('slideshow');
            slideshow.style.display = 'flex';
            
            // Start playing
            isPlaying = true;
            playBtn.textContent = '⏸️ Pause';
            startAutoplay();
            
            // Start music (if available)
            if (bgMusic) {
                bgMusic.play().catch(e => console.log('Music playback blocked:', e));
            }
            
            // Hide controls after 3 seconds
            setTimeout(() => {
                slideshow.classList.add('hide-controls');
            }, 3000);
        }
        
        // Make startSlideshow globally accessible for splash button
        window.startSlideshow = startSlideshowFromSplash;
        
        // Initialize display
        updateDisplay();
        
        // Generated: 2026-03-08 02:56
    </script>
</body>
